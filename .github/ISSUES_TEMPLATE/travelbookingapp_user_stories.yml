name: "📝 Travel Booking User Story Title"
description: "Template to develop and track app features based on User Stories"
title: "[STORY]: <Title of the User Story>"
labels: ["enhancement", "user-story"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📝 User Story Format
        *As a [Role], I want to [Action] so that [Benefit/Value].*

  - type: textarea
    id: context-description
    attributes:
      label: "🔍 Context & Description"
      placeholder: "Provide a brief summary of the feature and how it fits into the app flow."
      value: "Example: Enable users to register an account to secure their progress and data."
    validations:
      required: true

  - type: checkboxes
    id: acceptance-criteria
    attributes:
      label: "✅ Acceptance Criteria (Definition of Done)"
      options:
        - label: "Field [Field Name] is mandatory."
        - label: "Error message appears if [Failure Condition]."
        - label: "Data is persisted in [Local Storage/Database]."
        - label: "UI matches the design guidelines."

  - type: input
    id: evidence-file
    attributes:
      label: "🖼️ Evidence & Documentation"
      placeholder: "userstories-[name]-evidence.png"
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: "🛠️ Technical Implementation Notes"
      description: "API Endpoints, Components, State Management, etc."
      placeholder: "e.g., /auth/register, Redux, Context API..."
